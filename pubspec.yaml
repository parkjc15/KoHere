name: kohere
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  dio: ^5.9.2
  geolocator: ^14.0.2
  hive_ce: ^2.1.2
  hive_ce_flutter: ^2.1.1
  path_provider: ^2.1.5
  google_fonts: ^8.0.2
  uuid: ^4.5.3
  qr_flutter: ^4.1.0
  image_picker: ^1.2.1
  state_notifier: ^1.0.0
  share_plus: ^12.0.1
  screenshot: ^3.0.0
  intl: ^0.20.2
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  local_auth: ^3.0.1
  shared_preferences: ^2.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  image: ^4.8.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/fonts/
    - assets/images/explore/
  fonts:
    - family: NeoDunggeunmo
      fonts:
        - asset: assets/fonts/neodgm.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#F5F5F0"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter_native_splash:
  color: "#1A1A1A"
  image: "assets/splash_boot.png"
  fullscreen: true
  android: true
  ios: true
dependency_overrides:
  _fe_analyzer_shared: 97.0.0
  analyzer: 11.0.0
  matcher: 0.12.19
  meta: 1.18.1
  test: 1.30.0
  test_api: 0.7.10
  test_core: 0.6.16
